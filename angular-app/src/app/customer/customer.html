<h2>
    <!-- interpolation -->
    Welcome to the Customers Page, {{customer.name}}!
</h2>
<table border="1">
    <tr [class]="styclass">
       <td>
            <!-- Property Binding -->
            <input type = "text" [value]="customer.name"/>
            <!-- Two-way Data Binding -->
            <input type = "text" [(ngModel)]="customer.name"/>
       </td>
       <td>
            <!-- Event Binding -->
            <button (click)="handleChangeClick()">Click Me</button>
       </td>
    </tr>
   
    
</table>
