<div class="min-h-screen bg-gradient-to-br from-white via-slate-50 to-blue-50 px-4 py-6 sm:px-6 lg:px-8">
  <div class="mx-auto max-w-4xl space-y-6">
    <div class="rounded-[1.75rem] bg-white p-6 shadow-xl shadow-slate-200/70">
      <div class="flex flex-wrap items-center justify-between gap-4">
        <div>
          <p class="text-xs uppercase tracking-[0.35em] text-blue-700">User profile</p>
          <h1 class="text-3xl font-black text-slate-900">SSO or email/password account</h1>
          <p class="mt-2 text-slate-600">Manage traveler identity and saved details here.</p>
        </div>
        <a routerLink="/dashboard" class="rounded-full bg-blue-600 px-4 py-2 font-semibold text-white hover:bg-blue-700">Dashboard</a>
      </div>
    </div>

    @if (errorMessage()) {
      <div class="rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-red-700">{{ errorMessage() }}</div>
    }

    @if (successMessage()) {
      <div class="rounded-2xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-emerald-700">{{ successMessage() }}</div>
    }

    <form class="rounded-[1.75rem] bg-white p-6 shadow-xl shadow-slate-200/70" [formGroup]="profileForm" (ngSubmit)="save()">
      <div class="grid gap-4 sm:grid-cols-2">
        <label class="space-y-2 text-sm font-semibold text-slate-700">
          <span>Email</span>
          <input formControlName="email" class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3" />
        </label>
        <label class="space-y-2 text-sm font-semibold text-slate-700">
          <span>Full name</span>
          <input formControlName="fullName" class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3" />
        </label>
      </div>

      <label class="mt-4 block space-y-2 text-sm font-semibold text-slate-700">
        <span>SSO provider</span>
        <input formControlName="ssoProvider" class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3" placeholder="Google, Microsoft, Apple, or email-password" />
      </label>

      <div class="mt-5 flex flex-wrap gap-3">
        <button type="submit" class="rounded-full bg-blue-600 px-5 py-3 font-bold text-white hover:bg-blue-700" [disabled]="loading()">
          @if (loading()) { Saving... } @else { Save profile }
        </button>
        <a routerLink="/history" class="rounded-full border border-slate-300 px-5 py-3 font-semibold text-slate-700 hover:bg-slate-100">Booking history</a>
      </div>
    </form>
  </div>
</div>
