<div class="auth-shell">
  <div class="auth-card">
    <h1>Admin Sign In</h1>
    <p>Approve operators, manage routes, and control platform fee.</p>

    @if (errorMessage()) {
      <div class="error">{{ errorMessage() }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <label>
        Email
        <input type="email" formControlName="email" placeholder="admin@system.com" />
      </label>
      @if (submitted() && f['email'].errors) {
        <small class="error-text">Valid email is required.</small>
      }

      <label>
        Password
        <input type="password" formControlName="password" placeholder="********" />
      </label>
      @if (submitted() && f['password'].errors) {
        <small class="error-text">Password must be at least 8 characters.</small>
      }

      <button type="submit" [disabled]="loading()">
        @if (loading()) { Signing in... } @else { Sign In as Admin }
      </button>
    </form>
  </div>
</div>
